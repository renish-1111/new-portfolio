<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Renish | Full Stack Developer & AI Enthusiast</title>
    <meta name="description" content="Portfolio of Renish Ponkiya, a Full Stack Developer skilled in React, TypeScript, Python, Frappe/ERPNext, Docker and AI/ML. Available for internships and junior dev roles." />
    <meta name="keywords" content="Renish Ponkiya, Portfolio, Full Stack Developer, Frappe Developer, ERPNext, React, TypeScript, Python, Django, Docker, Jenkins" />
    <meta name="author" content="Renish Ponkiya" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#EAB308" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://renishponkiya.tech/" />
    <meta property="og:title" content="Renish | Full Stack Developer & AI Enthusiast" />
    <meta property="og:description" content="Portfolio of Renish Ponkiya — Full Stack Developer with React, Python, Frappe/ERPNext expertise. Explore interactive projects and experience." />
    <meta property="og:image" content="https://renishponkiya.tech/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@renish_1111" />
    <meta name="twitter:url" content="https://renishponkiya.tech/" />
    <meta name="twitter:title" content="Renish | Full Stack Developer & AI Enthusiast" />
    <meta name="twitter:description" content="Portfolio of Renish Ponkiya — Full Stack Developer with React, Python, Frappe/ERPNext expertise." />
    <meta name="twitter:image" content="https://renishponkiya.tech/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://renishponkiya.tech/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preconnect to font origins BEFORE the stylesheet — eliminates connection RTT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Load font with font-display=swap so text is visible instantly with fallback.
      Only load the weights actually used (400, 500, 700) — drops ~30 KB.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Renish Ponkiya",
      "url": "https://renishponkiya.tech/",
      "email": "ponkiyarenish@gmail.com",
      "jobTitle": "Full Stack Developer",
      "sameAs": [
        "https://github.com/renish-1111",
        "https://linkedin.com/in/gecr-comp220200107098",
        "https://x.com/renish_1111",
        "https://leetcode.com/renish-1111"
      ],
      "knowsAbout": ["React", "TypeScript", "Python", "Frappe", "ERPNext", "Django", "PostgreSQL", "Docker", "Jenkins"]
    }
    </script>

    <style>
      /* Critical inline styles — paint the dark background immediately before JS loads */
      html, body {
        background: #050505;
        color: #ffffff;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      /* Font stack: use system font until Space Grotesk loads (font-display:swap) */
      body {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      }
      /* Show a minimal centered loading indicator before React mounts */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
